<!-- @dsCard group="Feed cards" name="Feed card — Instagram" subtitle="Pink→gold border, IG badge, thumbnail + link" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Feed card — Instagram</title>
    <link rel="stylesheet" href="../styles/global.css" />
    <style>
      .wrap { padding: 2rem 1.5rem; max-width: 560px; }
      /* Thumbnail placeholder so the card has no external image dependency. */
      .thumb { aspect-ratio: 4 / 3; background: radial-gradient(circle at 30% 30%, #fff6, transparent 55%), var(--gradient-instagram); display: grid; place-items: center; font-size: 3rem; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <ul class="feed-list">
        <li class="feed-item feed-item--instagram">
          <h2>פוסט אינסטגרם לדוגמה</h2>
          <p class="feed-item__date">4 ביולי 2026</p>
          <a class="embed embed-instagram" href="#">
            <span class="badge badge-instagram">📸 אינסטגרם</span>
            <span class="embed-media"><span class="thumb">📸</span></span>
            <span class="embed-instagram__label">צפו באינסטגרם &larr;</span>
          </a>
          <p class="feed-item__caption">רגע מהסטודיו השבוע.</p>
        </li>
      </ul>
    </div>
  </body>
</html>
