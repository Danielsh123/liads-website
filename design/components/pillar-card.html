<!-- @dsCard group="Landing sections" name="Pillar card" subtitle="Gradient-topped action card with icon + tags" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Pillar card</title>
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body style="background: var(--color-bg);">
    <div style="max-width:340px;margin:0 auto;padding:2rem 1.5rem;">
        <div class="ls-reveal ls-in ls-card" style="position:relative;background:var(--color-surface);border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 26px rgba(27,36,52,0.08);border:1px solid rgba(27,36,52,0.04);transition:transform 0.25s cubic-bezier(0.16,1,0.3,1),box-shadow 0.25s ease;display:flex;flex-direction:column;"><div style="height:6px;background:linear-gradient(90deg,#ff8b3d,#ffc247);"></div><div style="padding:1.75rem;display:flex;flex-direction:column;flex:1;"><span aria-hidden="true" style="font-size:2.4rem;line-height:1;margin-bottom:0.9rem;">🕊️</span><h3 data-en="The Good Deeds Challenge" style="margin:0 0 0.6rem;font-size:1.3rem;font-weight:800;color:var(--color-text);">אתגר המעשים הטובים</h3><p data-en="Reclaiming Tisha B'Av — turning a day of senseless hatred into a full day of senseless love and kindness, backed by the Ramat Gan municipality." style="margin:0 0 1.1rem;color:var(--color-text-muted);line-height:1.6;flex:1;">הפיכת תשעה באב מיום של שנאת חינם ליום של אהבת חינם — יום שלם של מעשים טובים, בגיבוי עיריית רמת גן.</p><div style="display:flex;flex-wrap:wrap;gap:0.4rem;"><span data-en="Tisha B'Av" style="font-size:0.78rem;font-weight:700;color:var(--color-accent-2);background:rgba(43,163,227,0.1);padding:0.3rem 0.7rem;border-radius:999px;">תשעה באב</span><span data-en="Ramat Gan" style="font-size:0.78rem;font-weight:700;color:var(--color-accent-2);background:rgba(43,163,227,0.1);padding:0.3rem 0.7rem;border-radius:999px;">רמת גן</span><span data-en="National" style="font-size:0.78rem;font-weight:700;color:var(--color-accent-2);background:rgba(43,163,227,0.1);padding:0.3rem 0.7rem;border-radius:999px;">יוזמה ארצית</span></div></div></div>
    </div>
  </body>
</html>
