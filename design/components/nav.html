<!-- @dsCard group="Components" name="Sticky nav" subtitle="Cream blur bar — brand, links, EN/עב toggle" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Sticky nav</title>
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body style="background: var(--color-bg);">
    <nav style="position:sticky;top:0;z-index:50;background:rgba(253,248,241,0.82);backdrop-filter:blur(12px);border-bottom:1px solid rgba(27,36,52,0.06);">
      <div style="max-width:var(--max-width-content);margin:0 auto;padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;">
        <a href="#" style="display:flex;align-items:center;gap:0.6rem;font-weight:900;font-size:1.15rem;color:var(--color-text);">
          <span aria-hidden="true" style="width:34px;height:34px;border-radius:999px;background:var(--gradient-primary);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:1.05rem;box-shadow:0 4px 12px rgba(43,163,227,0.35);">♥</span>
          <span>ליעד שפירא</span>
        </a>
        <div class="site-nav" style="display:flex;align-items:center;gap:0.35rem;">
          <ul style="margin:0;display:flex;flex-wrap:wrap;gap:0.25rem;list-style:none;padding:0;">
            <li><a class="is-active" href="#" style="color:var(--color-text);font-size:0.95rem;">השפעה</a></li>
            <li><a href="#" style="color:var(--color-text);font-size:0.95rem;">תחומי פעולה</a></li>
            <li><a href="#" style="color:var(--color-text);font-size:0.95rem;">המסע</a></li>
            <li><a href="#" style="color:var(--color-text);font-size:0.95rem;">אינסטגרם</a></li>
            <li><a href="#" style="color:var(--color-text);font-size:0.95rem;">פודקאסטים</a></li>
            <li><a href="#" style="color:var(--color-text);font-size:0.95rem;">צור קשר</a></li>
          </ul>
          <button type="button" data-lang-toggle style="cursor:pointer;font-family:inherit;font-weight:800;font-size:0.85rem;border:2px solid var(--color-accent-2);background:transparent;color:var(--color-accent-2);padding:0.35rem 0.85rem;border-radius:999px;transition:all 0.15s ease;">EN</button>
        </div>
      </div>
    </nav>
  </body>
</html>
