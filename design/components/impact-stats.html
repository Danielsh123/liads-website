<!-- @dsCard group="Landing sections" name="Impact stats" subtitle="Count-up stat cards with gradient numerals" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Impact stats</title>
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body style="background: var(--color-bg);">
    <section style="max-width:var(--max-width-content);margin:0 auto;padding:2.5rem 1.5rem;">
      <div style="text-align:center;margin-bottom:2.25rem;">
        <h2 style="display:inline-block;width:auto;font-size:clamp(1.6rem,3.5vw,2.2rem);margin:0;">המספרים מאחורי התנועה</h2>
        <p style="color:var(--color-text-muted);font-size:1.1rem;margin:0.5rem 0 0;">מה שמתחיל בלב אחד, מגיע לאלפים.</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1.25rem;">
        <div style="background:var(--color-surface);border-radius:var(--radius);padding:2rem 1.5rem;text-align:center;box-shadow:0 8px 26px rgba(27,36,52,0.07);border:1px solid rgba(27,36,52,0.04);">
          <div style="font-size:clamp(2.6rem,6vw,3.4rem);font-weight:900;line-height:1;background:var(--gradient-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">15</div>
          <div style="font-weight:800;font-size:1.05rem;margin-top:0.6rem;">שנים</div>
          <div style="color:var(--color-text-muted);font-size:0.9rem;margin-top:0.35rem;">הגיל הוא כוח העל שלי</div>
        </div>
        <div style="background:var(--color-surface);border-radius:var(--radius);padding:2rem 1.5rem;text-align:center;box-shadow:0 8px 26px rgba(27,36,52,0.07);border:1px solid rgba(27,36,52,0.04);">
          <div style="font-size:clamp(2.6rem,6vw,3.4rem);font-weight:900;line-height:1;background:var(--gradient-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">1,000+</div>
          <div style="font-weight:800;font-size:1.05rem;margin-top:0.6rem;">מעשים טובים</div>
          <div style="color:var(--color-text-muted);font-size:0.9rem;margin-top:0.35rem;">ההשפעה של הפרויקט</div>
        </div>
        <div style="background:var(--color-surface);border-radius:var(--radius);padding:2rem 1.5rem;text-align:center;box-shadow:0 8px 26px rgba(27,36,52,0.07);border:1px solid rgba(27,36,52,0.04);">
          <div style="font-size:clamp(2.6rem,6vw,3.4rem);font-weight:900;line-height:1;background:var(--gradient-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">2</div>
          <div style="font-weight:800;font-size:1.05rem;margin-top:0.6rem;">בתי אבות מאומצים</div>
          <div style="color:var(--color-text-muted);font-size:0.9rem;margin-top:0.35rem;">עבודת שטח שורשית</div>
        </div>
      </div>
    </section>
  </body>
</html>
