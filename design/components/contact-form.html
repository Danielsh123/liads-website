<!-- @dsCard group="Landing sections" name="Contact form" subtitle="'Spread the love' gradient panel with form" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Contact form</title>
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body style="background: var(--color-bg);">
    <section style="max-width:var(--max-width-content);margin:0 auto;padding:2.5rem 1.5rem;">
        <div style="background:radial-gradient(circle at 15% 20%,rgba(255,255,255,0.18),transparent 42%),var(--gradient-primary);border-radius:28px;padding:clamp(2rem,5vw,3.5rem);color:#fff;box-shadow:0 20px 50px rgba(43,163,227,0.28);"><div style="text-align:center;max-width:46ch;margin:0 auto 2rem;"><h2 data-en="Let's spread the love together" style="margin:0 0 0.75rem;font-size:clamp(1.7rem,4vw,2.4rem);font-weight:900;color:#fff;width:auto;display:block;padding:0;">בואו נפיץ טוב ביחד</h2><p data-en="Municipalities, schools, and young people — want to launch the Good Deeds Challenge in your city or team up on a community project? Write to me." style="margin:0;font-size:1.1rem;color:rgba(255,255,255,0.92);line-height:1.6;">רשויות, בתי ספר ובני נוער — רוצים להשיק את אתגר המעשים הטובים בעיר שלכם או לשתף פעולה בפרויקט קהילתי? כתבו לי.</p></div><div data-form-success hidden style="max-width:520px;margin:0 auto;text-align:center;background:rgba(255,255,255,0.16);border-radius:var(--radius);padding:2.5rem 1.5rem;"><div aria-hidden="true" style="font-size:3rem;line-height:1;margin-bottom:0.75rem;">🌻</div><div data-en="Thank you, truly!" style="font-size:1.35rem;font-weight:800;">תודה מכל הלב!</div><p data-en="Your message is in. I'll be in touch soon so we can create good together." style="margin:0.5rem 0 0;color:rgba(255,255,255,0.9);">ההודעה נקלטה. נחזור אליכם בקרוב כדי ליצור טוב ביחד.</p></div><form data-contact-form style="max-width:640px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;"><label style="display:flex;flex-direction:column;gap:0.4rem;font-weight:700;font-size:0.9rem;"><span data-en="Full name">שם מלא</span><input type="text" required data-en-ph="What's your name?" placeholder="איך קוראים לכם?" style="font-family:inherit;font-size:1rem;padding:0.8rem 1rem;border-radius:12px;border:none;background:rgba(255,255,255,0.95);color:var(--color-text);outline:none;"></label><label style="display:flex;flex-direction:column;gap:0.4rem;font-weight:700;font-size:0.9rem;"><span data-en="Email">אימייל</span><input type="email" required data-en-ph="you@example.com" placeholder="you@example.com" style="font-family:inherit;font-size:1rem;padding:0.8rem 1rem;border-radius:12px;border:none;background:rgba(255,255,255,0.95);color:var(--color-text);outline:none;"></label><label style="display:flex;flex-direction:column;gap:0.4rem;font-weight:700;font-size:0.9rem;"><span data-en="I represent">אני מייצג/ת</span><select style="font-family:inherit;font-size:1rem;padding:0.8rem 1rem;border-radius:12px;border:none;background:rgba(255,255,255,0.95);color:var(--color-text);outline:none;"><option data-en="Municipality">רשות מקומית / עירייה</option><option data-en="School / educator">בית ספר / מוסד חינוכי</option><option data-en="Young person">בן/בת נוער</option><option data-en="Other">אחר</option></select></label><label style="display:flex;flex-direction:column;gap:0.4rem;font-weight:700;font-size:0.9rem;"><span data-en="City / organization">עיר / ארגון</span><input type="text" data-en-ph="e.g. Ramat Gan Municipality" placeholder="לדוגמה: עיריית רמת גן" style="font-family:inherit;font-size:1rem;padding:0.8rem 1rem;border-radius:12px;border:none;background:rgba(255,255,255,0.95);color:var(--color-text);outline:none;"></label><label style="display:flex;flex-direction:column;gap:0.4rem;font-weight:700;font-size:0.9rem;grid-column:1/-1;"><span data-en="Your idea">הרעיון שלכם</span><textarea rows="4" data-en-ph="Tell me how you'd like to collaborate…" placeholder="ספרו לי איך תרצו לשתף פעולה…" style="font-family:inherit;font-size:1rem;padding:0.8rem 1rem;border-radius:12px;border:none;background:rgba(255,255,255,0.95);color:var(--color-text);outline:none;resize:vertical;"></textarea></label><div style="grid-column:1/-1;text-align:center;margin-top:0.5rem;"><button type="submit" class="button" data-en="Let's create good together" style="background:#fff;color:var(--color-accent);font-size:1.05rem;padding:0.85rem 2rem;border:none;cursor:pointer;font-family:inherit;">בואו ניצור טוב ביחד</button></div></form></div>
    </section>
  </body>
</html>
