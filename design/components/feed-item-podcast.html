<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Feed card — podcast</title>
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body style="background: var(--color-bg);">
    <div style="padding:2rem 1.5rem;max-width:560px;">
      <ul class="feed-list">
        <li class="feed-item feed-item--podcast ls-reveal ls-in"><span class="badge badge-podcast">🎙 <span data-en="Podcast">פודקאסט</span></span><h3 data-en="From senseless love to senseless hate — and back">מאהבת חינם לשנאת חינם — ובחזרה</h3><p class="feed-item__date"><span data-en="July 2024">יולי 2024</span> · <span data-en="28 min">28 דק׳</span></p><div class="embed embed-podcast"><div style="display:flex;align-items:center;gap:1rem;padding:1rem;border-radius:var(--radius);background:linear-gradient(120deg,#12233a,#1c3a5e);color:#fff;"><span aria-hidden="true" style="width:88px;height:88px;border-radius:12px;overflow:hidden;flex:none;box-shadow:0 6px 16px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;background:var(--gradient-podcast);font-size:2rem;">🎙</span><span style="flex:1;min-width:0;"><span data-en="Ep. 1 · The idea behind the movement" style="display:block;font-weight:800;font-size:1.02rem;line-height:1.3;">פרק 1 · הרעיון שמאחורי התנועה</span><span style="display:block;color:rgba(255,255,255,0.72);font-size:0.85rem;margin-top:0.15rem;"><span data-en="Liad's Podcast">הפודקאסט של ליעד</span> · <span data-en="28 min">28 דק׳</span></span><span style="display:flex;align-items:center;gap:0.5rem;margin-top:0.7rem;"><span aria-hidden="true" style="width:34px;height:34px;border-radius:999px;background:#1ed760;display:inline-flex;align-items:center;justify-content:center;color:#0b1a10;font-size:0.95rem;">▶</span><span aria-hidden="true" style="height:6px;flex:1;border-radius:999px;background:rgba(255,255,255,0.22);position:relative;overflow:hidden;"><span style="position:absolute;inset-inline-start:0;top:0;bottom:0;width:34%;background:#1ed760;border-radius:999px;"></span></span></span></span></div></div><p class="feed-item__caption" data-en="How to turn a day of hate into a day of love, and why it starts with each of us.">איך הופכים יום של שנאה ליום של אהבה, ולמה זה מתחיל בכל אחד מאיתנו.</p></li>
      </ul>
    </div>
  </body>
</html>
