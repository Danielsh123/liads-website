<!DOCTYPE html>
<html lang="he" dir="rtl">

    <title>Site header</title>
    <link rel="stylesheet" href="../styles/global.css" />

      /* Avatar placeholder so the card is self-contained (no image dependency). */
      .header-avatar {

      }

      <nav class="site-nav">
        <ul>
          <li><a class="is-active" href="#">בית</a></li>
          <li><a href="#">עבודות</a></li>
          <li><a href="#">אודות</a></li>

        </ul>
      </nav>
    </header>
  </body>
</html>
