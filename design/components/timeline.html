<!-- @dsCard group="Landing sections" name="Journey timeline" subtitle="Vertical milestone track with gradient spine" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Journey timeline</title>
    <link rel="stylesheet" href="../styles/global.css" />
  </head>
  <body style="background: var(--color-bg);">
    <section style="max-width:560px;margin:0 auto;padding:2.5rem 1.5rem;">
      <div style="position:relative;padding-inline-start:2rem;">
        <span aria-hidden="true" style="position:absolute;inset-inline-start:7px;top:6px;bottom:6px;width:3px;border-radius:999px;background:var(--gradient-warm);"></span>
        <div style="position:relative;margin-bottom:1.75rem;">
          <span aria-hidden="true" style="position:absolute;inset-inline-start:-2rem;top:4px;width:17px;height:17px;border-radius:999px;background:var(--color-surface);border:4px solid var(--color-accent-2);box-shadow:0 0 0 4px rgba(43,163,227,0.14);"></span>
          <div style="background:var(--color-surface);border-radius:var(--radius);padding:1.4rem 1.6rem;box-shadow:0 6px 20px rgba(27,36,52,0.07);border:1px solid rgba(27,36,52,0.04);">
            <span style="display:inline-block;font-weight:900;font-size:0.85rem;color:var(--color-accent);background:rgba(255,139,61,0.12);padding:0.25rem 0.7rem;border-radius:999px;margin-bottom:0.6rem;">גיל 8½</span>
            <h3 style="margin:0 0 0.35rem;font-size:1.15rem;font-weight:800;">הניצוץ הראשון</h3>
            <p style="margin:0;color:var(--color-text-muted);line-height:1.55;">התחלתי לארגן מעשים טובים קטנים בשכונה — הרגע שבו הבנתי שאפשר לרתום אנשים לטוב.</p>
          </div>
        </div>
        <div style="position:relative;margin-bottom:0;">
          <span aria-hidden="true" style="position:absolute;inset-inline-start:-2rem;top:4px;width:17px;height:17px;border-radius:999px;background:var(--color-surface);border:4px solid var(--color-accent-2);box-shadow:0 0 0 4px rgba(43,163,227,0.14);"></span>
          <div style="background:var(--color-surface);border-radius:var(--radius);padding:1.4rem 1.6rem;box-shadow:0 6px 20px rgba(27,36,52,0.07);border:1px solid rgba(27,36,52,0.04);">
            <span style="display:inline-block;font-weight:900;font-size:0.85rem;color:var(--color-accent);background:rgba(255,139,61,0.12);padding:0.25rem 0.7rem;border-radius:999px;margin-bottom:0.6rem;">2025</span>
            <h3 style="margin:0 0 0.35rem;font-size:1.15rem;font-weight:800;">מבמת הכנסת</h3>
            <p style="margin:0;color:var(--color-text-muted);line-height:1.55;">נאמתי בכנסת וזכיתי בפרס החוסן הנוער — קול של דור שלם שבוחר באהבת חינם.</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
